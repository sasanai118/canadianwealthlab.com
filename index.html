<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canadian Wealth Lab | Interactive Market Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; transition: border 0.3s; }
        .input-field:focus { border-color: #3b82f6; }
        .btn-premium { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        h1, h2, h3, .nav-brand { font-weight: 900; letter-spacing: -0.05em; }
    </style>
</head>
<body class="bg-[#05070A] text-slate-100">

    <div class="fixed inset-0 bg-[radial-gradient(at_top_left,_#1e3a8a_0%,_transparent_40%)] opacity-20 -z-10"></div>

    <nav class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-4">
            <img src="Logo.png" alt="CWL Logo" class="h-14 w-auto">
            <div class="nav-brand text-xl uppercase italic hidden md:block">
                CANADIAN <span class="text-blue-500 font-black">WEALTH LAB</span>
            </div>
        </div>
        <div class="flex items-center space-x-6 text-[10px] font-bold uppercase tracking-[0.2em] text-slate-500">
            <a href="#lab" class="hover:text-white transition">The Lab</a>
            <a href="https://www.youtube.com/@CanadaWealthLab" target="_blank" class="px-5 py-2 border border-blue-500 text-blue-500 rounded-full hover:bg-blue-500 hover:text-white transition">YouTube</a>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto px-6 py-20 text-center">
        <h1 class="text-5xl md:text-8xl mb-12 uppercase italic leading-none tracking-tighter">
            KNOW YOUR <span class="text-blue-500">NUMBERS.</span>
        </h1>
        
        <div class="max-w-4xl mx-auto aspect-video rounded-[2.5rem] overflow-hidden border border-white/10 shadow-2xl glass mb-20">
            <iframe 
                class="w-full h-full"
                src="https://www.youtube.com/embed/IoN_JVXF6A8" 
                title="Canadian Wealth Lab Content" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
    </header>

    <section id="lab" class="max-w-6xl mx-auto px-6 py-20 border-t border-white/5">
        <div class="grid md:grid-cols-2 gap-8 mb-8">
            
            <div class="glass p-8 md:p-12 rounded-[3rem] border border-white/10 shadow-2xl">
                <h3 class="text-2xl uppercase italic mb-6 text-blue-500">01. Equity Stress Test</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Property Value ($)</label>
                        <input type="number" id="propValue" class="input-field" value="800000" oninput="calculateStress()">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Mortgage Balance ($)</label>
                        <input type="number" id="mortgageBal" class="input-field" value="600000" oninput="calculateStress()">
                    </div>
