<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canadian Wealth Lab | Interactive Market Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; transition: border 0.3s; }
        .input-field:focus { border-color: #3b82f6; }
        .btn-premium { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        h1, h2, h3, .nav-brand { font-weight: 900; letter-spacing: -0.05em; }
    </style>
</head>
<body class="bg-[#05070A] text-slate-100">

    <div class="fixed inset-0 bg-[radial-gradient(at_top_left,_#1e3a8a_0%,_transparent_40%)] opacity-20 -z-10"></div>

    <nav class="max-w-7xl mx-auto px-6 py-8 flex justify-center items-center border-b border-white/5">
        <div class="flex items-center gap-4">
            <img src="Logo.png" alt="CWL Logo" class="h-14 w-auto">
            <div class="nav-brand text-2xl uppercase hidden md:block tracking-tighter">
                CANADIAN <span class="text-blue-500 font-black">WEALTH LAB</span>
            </div>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto px-6 py-20 text-center">
        <h1 class="text-5xl md:text-8xl mb-12 uppercase leading-none tracking-tighter">
            KNOW YOUR <span class="text-blue-500">NUMBERS.</span>
        </h1>
        
        <div class="max-w-4xl mx-auto aspect-video rounded-[2.5rem] overflow-hidden border border-white/10 shadow-2xl glass mb-12">
            <iframe 
                class="w-full h-full"
                src="https://www.youtube.com/embed/IoN_JVXF6A8" 
                title="Canadian Wealth Lab Content" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>

        <div class="flex flex-col sm:flex-row justify-center items-center gap-6 max-w-2xl mx-auto">
            <a href="#lab" class="w-full sm:w-auto px-12 py-5 bg-white text-black font-black rounded-2xl hover:bg-gray-200 transition uppercase tracking-widest text-sm shadow-xl">
                The Lab Tools
            </a>
            <a href="https://www.youtube.com/@CanadaWealthLab" target="_blank" class="w-full sm:w-auto px-12 py-5 btn-premium text-white font-black rounded-2xl hover:scale-105 transition uppercase tracking-widest text-sm shadow-xl">
                YouTube Channel
            </a>
        </div>
    </header>

    <section id="lab" class="max-w-6xl mx-auto px-6 py-24 border-t border-white/5">
        
        <div class="mb-16 text-center">
            <h2 class="text-4xl uppercase mb-2 font-black tracking-tighter">The Interactive Lab</h2>
            <p class="text-blue-500 font-bold text-xs uppercase tracking-[0.2em]">Macro Analysis Framework</p>
        </div>

        <div class="grid md:grid-cols-2 gap-8 mb-8 text-left">
            
            <div class="glass p-8 md:p-12 rounded-[3rem] border border-white/10 shadow-2xl">
                <h3 class="text-2xl uppercase mb-8 text-blue-500 font-black tracking-tight">01. Equity Stress Test</h3>
                <div class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Property Value ($)</label>
                        <input type="number" id="propValue" class="input-field font-bold" value="800000" oninput="calculateStress()">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Mortgage Balance ($)</
