<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canadian Wealth Lab | Market Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); }
        .card-glow:hover { 
            background: rgba(59, 130, 246, 0.05); 
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-4px);
        }
        .btn-premium {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            transition: all 0.3s ease;
        }
        h1, h2, h3, .nav-brand { font-weight: 900; letter-spacing: -0.05em; }
    </style>
</head>
<body class="bg-[#05070A] text-slate-100">

    <div class="fixed inset-0 bg-[radial-gradient(at_top_left,_#1e3a8a_0%,_transparent_40%)] opacity-20 -z-10"></div>

    <nav class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-4">
            <img src="Logo.png" alt="CWL Logo" class="h-14 md:h-16 w-auto">
            <div class="nav-brand text-xl uppercase italic hidden md:block">
                CANADIAN <span class="text-blue-500">WEALTH LAB</span>
            </div>
        </div>
        <div class="flex items-center space-x-6 text-[10px] font-bold uppercase tracking-[0.2em] text-slate-500">
            <a href="#tools" class="hover:text-white transition uppercase">Lab Tools</a>
            <a href="https://www.youtube.com/@CanadaWealthLab" target="_blank" class="px-5 py-2 border border-blue-500 text-blue-500 rounded-full hover:bg-blue-500 hover:text-white transition">YouTube</a>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto px-6 py-20 text-center">
        <h1 class="text-5xl md:text-8xl mb-8 uppercase italic leading-none tracking-tighter">
            KNOW YOUR <span class="text-blue-500">NUMBERS.</span>
        </h1>
        
        <div class="max-w-4xl mx-auto mt-12 mb-16 aspect-video rounded-[2.5rem] overflow-hidden border border-white/10 shadow-[0_0_50px_-12px_rgba(37,99,235,0.3)] glass">
            <iframe 
                class="w-full h-full"
                src="https://www.youtube.com/embed?listType=user_uploads&list=CanadaWealthLab" 
                title="Latest from Canadian Wealth Lab" 
                frameborder="0" 
                allowfullscreen>
            </iframe>
        </div>

        <div class="flex justify-center">
            <a href="#tools" class="px-12 py-6 btn-premium rounded-2xl font-black text-xl transition uppercase italic tracking-tight">
                Access Survival Tools
            </a>
        </div>
    </header>

    <section id="tools" class="max-w-7xl mx-auto px-6 py-20 border-t border-white/5">
