<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canadian Wealth Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #05070A; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; padding: 2rem; }
        .input-box { background: #111; border: 1px solid #333; padding: 10px; width: 100%; border-radius: 8px; color: white; margin-bottom: 15px; }
        .result { font-weight: 900; font-size: 2.5rem; font-style: italic; color: #3b82f6; }
    </style>
</head>
<body class="p-6">

    <nav class="max-w-4xl mx-auto flex justify-between items-center mb-16">
        <img src="Logo.png" class="h-12">
        <a href="https://www.youtube.com/@CanadaWealthLab" class="text-blue-500 font-bold uppercase text-xs tracking-widest border border-blue-500 px-4 py-2 rounded-full">YouTube</a>
    </nav>

    <header class="text-center mb-20">
        <h1 class="text-6xl font-black italic tracking-tighter uppercase">Know Your <span class="text-blue-500">Numbers.</span></h1>
    </header>

    <main class="max-w-4xl mx-auto grid gap-8">
        <div class="glass">
            <h2 class="text-blue-500 font-black uppercase italic mb-6">01. Equity Stress Test</h2>
            <label class="text-xs uppercase font-bold text-gray-500">Value ($)</label>
            <input type="number" id="v" class="input-box" value="800000" oninput="run()">
            <label class="text-xs uppercase font-bold text-gray-500">Mortgage ($)</label>
            <input type="number" id="m" class="input-box" value="600000" oninput="run()">
            <div class="mt-4 p-4 bg-blue-500/10 rounded-xl text-center">
                <p class="text-xs uppercase font-bold text-blue-400">LTV Ratio</p>
                <div id="res" class="result">75%</div>
            </div>
        </div>

        <div class="glass">
            <h2 class="text-blue-500 font-black uppercase italic mb-6">02. Landlord Trap</h2>
            <label class="text-xs uppercase font-bold text-gray-500">Rent ($)</label>
            <input type="number" id="ri" class="input-box" value="3000" oninput="run()">
            <label class="text-xs uppercase font-bold text-gray-500">Expenses ($)</label>
            <input type="number" id="re" class="input-box" value="3500" oninput="run()">
            <div class="mt-4 p-4 bg-blue-500/10 rounded-xl text-center">
                <p class="text-xs uppercase font-bold text-blue-400">Cash Flow</p>
                <div id="cf" class="result">-$500</div>
            </div>
        </div>
    </nav>

    <script>
        function run() {
            const v = document.getElementById('v').value;
            const m = document.getElementById('m').value;
            document.getElementById('res').innerText = Math.round((m/v)*100) + "%";

            const ri = document.getElementById('ri').value;
            const re = document.getElementById('re').value;
            const flow = ri - re;
            document.getElementById('cf').innerText = (flow < 0 ? "-$" : "$") + Math.abs(flow);
        }
        run();
    </script>

</body>
</html>
